<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Inventory Team Incoming Calls Report</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f0f4f8;
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    padding: 24px;
    color: #333;
  }

  .report-wrapper {
    max-width: 1100px;
    margin: 0 auto;
    background: #fff;
    border-radius: 18px;
    border: 2px solid #a8dde9;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    overflow: hidden;
  }

  /* ── Title Bar ── */
  .report-title {
    background: linear-gradient(90deg, #b2eaf5 0%, #c8f0f8 50%, #b2eaf5 100%);
    border-bottom: 2px solid #a8dde9;
    text-align: center;
    padding: 14px 20px;
  }
  .report-title h1 {
    font-size: 1.2rem;
    font-weight: 800;
    color: #1a7a96;
    letter-spacing: .01em;
  }

  /* ── Filter Row ── */
  .filter-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    border-bottom: 1px solid #daeef5;
    flex-wrap: wrap;
    background: #fff;
  }
  .filter-dropdown {
    display: flex;
    align-items: center;
    gap: 6px;
    border: 1.5px solid #b0cdd8;
    border-radius: 20px;
    padding: 6px 14px;
    font-family: 'Nunito', sans-serif;
    font-size: .85rem;
    font-weight: 600;
    color: #444;
    background: #fff;
    cursor: pointer;
    outline: none;
    appearance: none;
    min-width: 120px;
  }
  .filter-btn {
    display: flex; align-items: center; gap: 6px;
    border: 1.5px solid #b0cdd8; border-radius: 20px;
    padding: 6px 16px; font-family: 'Nunito', sans-serif;
    font-size: .85rem; font-weight: 600; color: #444;
    background: #fff; cursor: pointer;
    white-space: nowrap;
  }
  .filter-btn .arrow { font-size: .7rem; color: #999; margin-left: 4px; }
  .filter-btn:hover { border-color: #5bbfd4; color: #1a7a96; }

  /* ── Stats Section ── */
  .stats-section {
    border: 2px solid #a8dde9;
    border-radius: 14px;
    margin: 14px 16px 16px;
    padding: 14px 12px;
    background: #fff;
  }
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 8px;
  }
  @media (max-width: 900px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
  @media (max-width: 500px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }

  /* ── Stat Card ── */
  .stat-card {
    border: 1.5px solid #a8dde9;
    border-radius: 12px;
    padding: 10px 10px 8px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    background: #fff;
    position: relative;
    min-width: 0;
  }
  .stat-label {
    font-size: .68rem;
    font-weight: 700;
    color: #2aaac8;
    margin-bottom: 4px;
    line-height: 1.2;
    white-space: nowrap;
  }
  .stat-value {
    font-size: 1.65rem;
    font-weight: 800;
    color: #222;
    line-height: 1;
    margin-bottom: 2px;
  }
  .stat-pct {
    font-size: .75rem;
    font-weight: 700;
    color: #e63030;
    margin-bottom: 6px;
  }
  .stat-bar-wrap {
    width: 100%;
    height: 6px;
    background: #e0e0e0;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 4px;
  }
  .stat-bar-fill {
    height: 100%;
    border-radius: 4px;
    background: #e63030;
    transition: width .6s ease;
  }
  .stat-total {
    font-size: .62rem;
    color: #aaa;
    font-weight: 600;
    align-self: flex-end;
    margin-top: 1px;
  }
</style>
</head>
<body>

<div class="report-wrapper">

  <!-- Title -->
  <div class="report-title">
    <h1>Inventory Team Incoming Calls Report</h1>
  </div>

  <!-- Filters -->
  <div class="filter-row">
    <button class="filter-btn">RID <span class="arrow">▾</span></button>
    <button class="filter-btn">Agent Name <span class="arrow">▾</span></button>
    <button class="filter-btn">Call Related To <span class="arrow">▾</span></button>
    <button class="filter-btn" id="date-range-btn">May 1, 2026 - May 12, 2026 <span class="arrow">▾</span></button>
  </div>

  <!-- Stats Cards -->
  <div class="stats-section">
    <div class="stats-grid" id="stats-grid">

      <div class="stat-card">
        <div class="stat-label">Total Calls</div>
        <div class="stat-value">5,688</div>
        <div class="stat-pct">78.3%</div>
        <div class="stat-bar-wrap"><div class="stat-bar-fill" style="width:78.3%"></div></div>
        <div class="stat-total">7,262</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Avg Total Calls</div>
        <div class="stat-value">474</div>
        <div class="stat-pct">78.3%</div>
        <div class="stat-bar-wrap"><div class="stat-bar-fill" style="width:78.3%"></div></div>
        <div class="stat-total">605</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Done Calls</div>
        <div class="stat-value">3,574</div>
        <div class="stat-pct">82.5%</div>
        <div class="stat-bar-wrap"><div class="stat-bar-fill" style="width:82.5%"></div></div>
        <div class="stat-total">4,334</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Avg Done Calls</div>
        <div class="stat-value">298</div>
        <div class="stat-pct">82.5%</div>
        <div class="stat-bar-wrap"><div class="stat-bar-fill" style="width:82.5%"></div></div>
        <div class="stat-total">361</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Close Calls</div>
        <div class="stat-value">1,344</div>
        <div class="stat-pct">71.3%</div>
        <div class="stat-bar-wrap"><div class="stat-bar-fill" style="width:71.3%"></div></div>
        <div class="stat-total">1,886</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Not Related Calls</div>
        <div class="stat-value">560</div>
        <div class="stat-pct">79.3%</div>
        <div class="stat-bar-wrap"><div class="stat-bar-fill" style="width:79.3%"></div></div>
        <div class="stat-total">706</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Total Issues</div>
        <div class="stat-value">3,481</div>
        <div class="stat-pct">84.9%</div>
        <div class="stat-bar-wrap"><div class="stat-bar-fill" style="width:84.9%"></div></div>
        <div class="stat-total">4,099</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Total Training</div>
        <div class="stat-value">571</div>
        <div class="stat-pct">72.5%</div>
        <div class="stat-bar-wrap"><div class="stat-bar-fill" style="width:72.5%"></div></div>
        <div class="stat-total">788</div>
      </div>

    </div>
  </div>

</div>

<script>
  // ── Live date range label ─────────────────────────────────
  function formatDateRange(d1, d2) {
    const opts = { month: 'short', day: 'numeric', year: 'numeric' };
    return d1.toLocaleDateString('en-US', opts) + ' - ' + d2.toLocaleDateString('en-US', opts);
  }
  // Set to today's range (first of month → today)
  const today = new Date();
  const firstOfMonth = new Date(today.getFullYear(), today.getMonth(), 1);
  document.getElementById('date-range-btn').childNodes[0].textContent =
    formatDateRange(firstOfMonth, today) + ' ';

  // ── Animate bars on load ──────────────────────────────────
  document.querySelectorAll('.stat-bar-fill').forEach(bar => {
    const target = bar.style.width;
    bar.style.width = '0%';
    setTimeout(() => bar.style.width = target, 100);
  });
</script>
</body>
</html>
